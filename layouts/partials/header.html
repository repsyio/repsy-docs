<header class="repsy-header">
  <div class="header-row">
    <div>
      <button class="sidebar-toggle-btn" onclick="toggleSidebar()" aria-label="Toggle Sidebar">
        <svg width="24px" height="24px" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>
      <a href="/" class="logo">
        <img src="{{ "images/logo.svg" | relURL }}" alt="Repsy logo" />
        <span class="docs-text">DOCS</span>
      </a>
    </div>
    <!-- Mobile dropdown menu toggle -->
    <button class="mobile-menu-btn" onclick="toggleMobileMenu()" aria-expanded="false" aria-label="Toggle Menu">
      <svg class="caret-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9" />
      </svg>
    </button>

    <!-- Mobile dropdown -->
    <div class="mobile-nav-dropdown" id="mobileNavDropdown">
      <a href="/">Home</a>
      <a href="https://blog.repsy.io/" target="_blank" rel="noopener noreferrer">Blog</a>
      <a href="https://repsy.io/contact" target="_blank" rel="noopener noreferrer">Contact</a>
      <a href="https://github.com/repsyio" target="_blank" rel="noopener">
        <img src="{{ "images/github.svg" | relURL }}" alt="GitHub" />
      </a>
    </div>


    <!-- Navigation links -->
    <nav class="header-nav">
      <a href="/">Home</a>
      <a href="https://blog.repsy.io/" target="_blank" rel="noopener noreferrer">Blog</a>
      <a href="https://repsy.io/contact" target="_blank" rel="noopener noreferrer">Contact</a>
      <a href="https://github.com/repsyio" target="_blank" rel="noopener">
        <img src="{{ "images/github.svg" | relURL }}" alt="GitHub" />
      </a>
    </nav>

  </div>
  <hr class="gradient-divider">
</header>
<script>
  window.addEventListener("scroll", () => {
    const header = document.querySelector(".header-row");
    if (window.scrollY > 50) {
      header.classList.add("smaller");
    } else {
      header.classList.remove("smaller");
    }
  });


function toggleMobileMenu() {
  const dropdown = document.getElementById("mobileNavDropdown");
  const btn = document.querySelector(".mobile-menu-btn");
  const isOpen = dropdown.classList.toggle("open");
  btn.setAttribute("aria-expanded", isOpen);
}


</script>
